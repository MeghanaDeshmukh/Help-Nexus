<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpNexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Page transitions ────────────────────────────────── */
    .page-enter { animation: fadeIn 0.22s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

    .tab-nav-inner a.active {
      background: var(--color-primary-light);
      color: #fff;
      border-color: var(--color-primary-light);
    }
    .contact-btn-react {
      background:var(--color-accent); color:#fff !important;
      font-size:13px; font-weight:700; padding:9px 20px;
      letter-spacing:.04em; border-radius:2px; white-space:nowrap;
      cursor:pointer; border:none; font-family:inherit; transition:background .2s ease;
    }
    .contact-btn-react:hover { background:var(--color-accent-dark); }
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      background:none; border:1px solid var(--color-primary);
      color:var(--color-primary); font-size:13px; font-weight:600;
      padding:7px 16px; border-radius:2px; cursor:pointer;
      font-family:inherit; margin-bottom:20px; transition:all .15s ease;
    }
    .back-btn:hover { background:var(--color-primary); color:#fff; }
    .form-error-banner {
      background:#fff0f0; border:1px solid #fcc;
      border-left:4px solid #e53935; padding:12px 16px;
      border-radius:2px; margin-bottom:16px; font-size:13.5px; color:#c62828;
    }
    .success-msg { display:block !important; }

    /* ════════════════════════════════════════════════════════
       CHAT WIDGET
    ════════════════════════════════════════════════════════ */
    .cw-root * { box-sizing:border-box; margin:0; padding:0; }
    .cw-root {
      font-family:'DM Sans', sans-serif;
      position:fixed; bottom:28px; right:28px; z-index:9999;
    }

    /* FAB */
    .cw-fab {
      width:60px; height:60px; border-radius:16px;
      background:#0a0a0a; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 8px 32px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
      transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
      position:relative; overflow:hidden;
    }
    .cw-fab::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,#e8ff47 0%,#00e5ff 100%);
      opacity:0; transition:opacity .2s;
    }
    .cw-fab:hover { transform:scale(1.08); box-shadow:0 12px 40px rgba(0,0,0,.4); }
    .cw-fab:hover::before { opacity:1; }
    .cw-fab svg { position:relative; z-index:1; transition:color .2s; }
    .cw-fab:hover svg { color:#0a0a0a !important; }
    .cw-dot {
      position:absolute; top:8px; right:8px;
      width:10px; height:10px; background:#e8ff47;
      border-radius:50%; border:2px solid #0a0a0a;
      animation:cw-pulse 2s infinite;
    }
    @keyframes cw-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:.7} }

    /* Window */
    .cw-window {
      position:absolute; bottom:72px; right:0;
      width:370px; max-height:560px;
      background:#0a0a0a; border-radius:24px;
      display:flex; flex-direction:column; overflow:hidden;
      box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.07);
      transform-origin:bottom right;
      animation:cw-open .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes cw-open { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

    /* Header */
    .cw-header {
      padding:18px 20px 14px; background:#111;
      border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0;
    }
    .cw-header-top { display:flex; align-items:center; justify-content:space-between; }
    .cw-title { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#fff; letter-spacing:-.3px; }
    .cw-status { display:flex; align-items:center; gap:6px; font-size:11px; color:rgba(255,255,255,.4); }
    .cw-status-dot { width:6px; height:6px; background:#e8ff47; border-radius:50%; }
    .cw-close {
      background:rgba(255,255,255,.07); border:none; color:rgba(255,255,255,.5);
      width:28px; height:28px; border-radius:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s,color .15s; margin-left:10px;
    }
    .cw-close:hover { background:rgba(255,255,255,.12); color:#fff; }
    .cw-accent-bar { height:2px; background:linear-gradient(90deg,#e8ff47,#00e5ff); border-radius:2px; margin-top:10px; width:40px; }

    /* Messages */
    .cw-messages {
      flex:1; overflow-y:auto; padding:14px 14px 6px;
      display:flex; flex-direction:column; gap:10px;
      scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent;
      min-height:0;
    }
    .cw-messages::-webkit-scrollbar { width:4px; }
    .cw-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:4px; }

    .cw-msg { display:flex; flex-direction:column; max-width:85%; animation:cw-msg-in .18s ease; }
    @keyframes cw-msg-in { from{transform:translateY(5px);opacity:0} to{transform:translateY(0);opacity:1} }
    .cw-msg.user      { align-self:flex-end;  align-items:flex-end;  }
    .cw-msg.bot       { align-self:flex-start; align-items:flex-start; }

    .cw-bubble {
      padding:10px 14px; border-radius:16px;
      font-size:13px; line-height:1.55;
    }
    .cw-msg.user .cw-bubble {
      background:linear-gradient(135deg,#e8ff47,#c8e000);
      color:#0a0a0a; border-bottom-right-radius:4px; font-weight:500;
    }
    .cw-msg.bot .cw-bubble {
      background:#1c1c1c; color:rgba(255,255,255,.88);
      border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,.06);
    }

    /* Typing */
    .cw-typing {
      display:flex; align-items:center; gap:4px; padding:12px 14px;
      background:#1c1c1c; border-radius:16px; border-bottom-left-radius:4px;
      border:1px solid rgba(255,255,255,.06); width:fit-content;
    }
    .cw-typing span { width:6px; height:6px; background:rgba(255,255,255,.3); border-radius:50%; animation:cw-bounce 1.2s infinite; }
    .cw-typing span:nth-child(2) { animation-delay:.2s; }
    .cw-typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes cw-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px);background:#e8ff47} }

    /* Quick reply chips */
    .cw-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; max-width:320px; }
    .cw-chip {
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14);
      color:rgba(255,255,255,.8); font-size:11.5px; padding:5px 11px;
      border-radius:20px; cursor:pointer; font-family:'DM Sans',sans-serif;
      transition:background .15s,border-color .15s; white-space:nowrap;
    }
    .cw-chip:hover { background:rgba(232,255,71,.15); border-color:rgba(232,255,71,.4); color:#e8ff47; }

    /* Inline button inside bot message (e.g. "open contact form") */
    .cw-inline-btn {
      background:none; border:1px solid rgba(232,255,71,.5); color:#e8ff47;
      font-size:12.5px; padding:3px 10px; border-radius:12px; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:background .15s;
    }
    .cw-inline-btn:hover { background:rgba(232,255,71,.15); }

    /* Contact CTA card inside chat */
    .cw-contact-cta {
      background:#1a1a1a; border:1px solid rgba(255,255,255,.1);
      border-radius:12px; padding:12px 14px; margin-top:4px;
      font-size:12.5px; color:rgba(255,255,255,.7);
    }
    .cw-contact-cta-btn {
      display:block; width:100%; margin-top:10px;
      background:linear-gradient(135deg,#e8ff47,#c8e000);
      color:#0a0a0a; border:none; border-radius:10px;
      padding:9px; font-weight:700; font-size:13px;
      cursor:pointer; font-family:'DM Sans',sans-serif;
      transition:opacity .15s;
    }
    .cw-contact-cta-btn:hover { opacity:.88; }

    /* Lead input */
    .cw-lead-input {
      background:#1c1c1c; border:1px solid rgba(255,255,255,.12);
      color:#fff; border-radius:10px; padding:9px 12px;
      font-size:13px; font-family:'DM Sans',sans-serif;
      width:100%; outline:none; margin-top:6px;
      transition:border-color .15s;
    }
    .cw-lead-input:focus { border-color:rgba(232,255,71,.4); }

    /* Input area */
    .cw-input-area {
      padding:10px 12px 14px; background:#111;
      border-top:1px solid rgba(255,255,255,.06);
      display:flex; gap:8px; align-items:flex-end; flex-shrink:0;
    }
    .cw-input {
      flex:1; background:#1c1c1c; border:1px solid rgba(255,255,255,.08);
      border-radius:12px; color:#fff; font-family:'DM Sans',sans-serif;
      font-size:13px; padding:9px 13px; resize:none; outline:none;
      transition:border-color .15s; max-height:90px; line-height:1.4;
    }
    .cw-input::placeholder { color:rgba(255,255,255,.25); }
    .cw-input:focus { border-color:rgba(232,255,71,.4); }
    .cw-send {
      width:38px; height:38px; border-radius:10px; background:#e8ff47;
      border:none; cursor:pointer; display:flex; align-items:center;
      justify-content:center; flex-shrink:0; transition:transform .15s,background .15s;
    }
    .cw-send:hover { transform:scale(1.06); background:#d4eb2a; }
    .cw-send:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  </style>
</head>
<body>

<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  DATA FILES — only these need editing                       ║
  ╠══════════════════════════════════════════════════════════════╣
  ║  data/services.js  — service bar, form dropdown, footer     ║
  ║  data/content.js   — all page text, contact details         ║
  ║  data/chatbot.js   — all FAQ responses, flows, lead capture ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<script src="data/services.js"></script>
<script src="data/content.js"></script>
<script src="data/chatbot.js"></script>

<!-- Header -->
<header class="top-header">
  <div class="top-header-inner">
    <div class="logo-wrap" id="logo-root"></div>
    <div class="header-right">
      <div class="top-links" id="header-nav-root"></div>
      <div class="header-actions"><div id="contact-btn-root"></div></div>
    </div>
  </div>
</header>

<div id="service-bar-root"></div>
<div id="app-root"></div>
<div id="footer-root"></div>
<div id="chat-root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ══════════════════════════════════════════════════════════════
   EMAILJS CONFIG  ← replace these with your own values
   https://www.emailjs.com  (free, 200 emails/month)
══════════════════════════════════════════════════════════════ */
const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";
const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
const EMAILJS_PUBLIC_KEY  = "YOUR_PUBLIC_KEY";

const SERVICES = window.SERVICES_DATA;
const CONTENT  = window.CONTENT_DATA;
const BOT      = window.CHATBOT_DATA;

let _setPageGlobal = null;

/* ══════════════════════════════════════════════════════════════
   FAQ MATCHING ENGINE
   Scores each FAQ entry by counting how many of its keywords
   appear in the visitor's message, then returns the best match.
══════════════════════════════════════════════════════════════ */
function findBestFaq(text) {
  const lower = text.toLowerCase();
  let best = null, bestScore = 0;

  for (const faq of BOT.faqs) {
    let score = 0;
    for (const kw of faq.keywords) {
      if (lower.includes(kw.toLowerCase())) score++;
    }
    if (score > bestScore) { bestScore = score; best = faq; }
  }
  return bestScore > 0 ? best : null;
}

/* ══════════════════════════════════════════════════════════════
   CHAT WIDGET
══════════════════════════════════════════════════════════════ */
function ChatWidget({ onOpenContact }) {
  const [open, setOpen]         = useState(false);
  const [msgs, setMsgs]         = useState([]);
  const [input, setInput]       = useState("");
  const [typing, setTyping]     = useState(false);
  // Lead capture state
  const [leadMode, setLeadMode] = useState(false);
  const [leadStep, setLeadStep] = useState(0);
  const [leadData, setLeadData] = useState({name:"", email:"", service:"", message:""});
  const bottomRef               = useRef(null);

  // Send greeting on first open
  useEffect(() => {
    if (open && msgs.length === 0) {
      addBotMsg(BOT.greeting, BOT.openingReplies);
    }
  }, [open]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior:"smooth" });
  }, [msgs, typing]);

  function addBotMsg(text, chips=[], extra=null) {
    setMsgs(prev => [...prev, { role:"bot", text, chips, extra }]);
  }

  function addUserMsg(text) {
    setMsgs(prev => [...prev, { role:"user", text }]);
  }

  /* Simulate a short typing delay so it feels natural */
  function botReply(text, chips=[], extra=null, delay=600) {
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      addBotMsg(text, chips, extra);
    }, delay);
  }

  /* Handle a chip click or typed message */
  function handleUserInput(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    addUserMsg(trimmed);
    setInput("");

    // ── Lead capture flow ──
    if (leadMode) {
      handleLeadStep(trimmed);
      return;
    }

    // ── Check if triggering lead capture ──
    const lower = trimmed.toLowerCase();
    const isLeadTrigger = BOT.leadCapture.triggerPhrases.some(p => lower.includes(p.toLowerCase()));
    if (isLeadTrigger) {
      setLeadMode(true);
      setLeadStep(0);
      botReply(BOT.leadCapture.steps[0].prompt);
      return;
    }

    // ── Open contact form shortcuts ──
    if (lower.includes("open contact form") || lower.includes("contact form") || lower.includes("get a free quote") || lower.includes("get a quote")) {
      botReply("Opening the contact form for you! 👇", [], { type:"open_contact" });
      return;
    }

    // ── FAQ matching ──
    const faq = findBestFaq(trimmed);
    if (faq) {
      if (faq.action === "open_contact") {
        botReply(faq.response, faq.quickReplies || [], { type:"open_contact" });
      } else if (faq.action === "show_contact_cta") {
        botReply(faq.response, faq.quickReplies || [], { type:"contact_cta" });
      } else {
        botReply(faq.response, faq.quickReplies || []);
      }
    } else {
      botReply(BOT.fallback, BOT.openingReplies);
    }
  }

  /* Lead capture step handler */
  async function handleLeadStep(value) {
    const steps    = BOT.leadCapture.steps;
    const field    = steps[leadStep].field;
    const newData  = { ...leadData, [field]: value };
    setLeadData(newData);

    if (leadStep < steps.length - 1) {
      // Next step — personalise prompt with collected name
      const next = steps[leadStep + 1].prompt.replace("{name}", newData.name || "");
      setLeadStep(leadStep + 1);
      botReply(next);
    } else {
      // All steps complete — send email
      setLeadMode(false);
      setLeadStep(0);
      const confirmation = BOT.leadCapture.confirmationMessage
        .replace("{name}", newData.name)
        .replace("{email}", newData.email);
      botReply(confirmation, ["What services do you offer?", "How does it work?"]);

      // Send via EmailJS
      try {
        await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          from_name:  newData.name,
          from_email: newData.email,
          service:    newData.service || "Not specified",
          message:    newData.message || "Chat lead — no message",
          subject:    BOT.leadCapture.emailSubject.replace("{name}", newData.name),
          phone:      "Via chat",
          company:    "Via chat",
          country:    "Unknown",
          howheard:   "Chatbot"
        }, EMAILJS_PUBLIC_KEY);
      } catch(e) {
        console.warn("EmailJS failed:", e);
      }
      setLeadData({name:"", email:"", service:"", message:""});
    }
  }

  const handleKey = e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleUserInput(input); }
  };

  /* Render a single message bubble */
  function Message({ msg }) {
    if (msg.role === "user") {
      return (
        <div className="cw-msg user">
          <div className="cw-bubble">{msg.text}</div>
        </div>
      );
    }
    return (
      <div className="cw-msg bot">
        <div className="cw-bubble" dangerouslySetInnerHTML={{ __html: msg.text }} />

        {/* Action extras */}
        {msg.extra?.type === "open_contact" && (
          <button className="cw-contact-cta-btn" style={{marginTop:8,borderRadius:10,padding:"9px 14px"}}
            onClick={() => { onOpenContact(); setOpen(false); }}>
            ✉ Open Contact Form →
          </button>
        )}
        {msg.extra?.type === "contact_cta" && (
          <div className="cw-contact-cta">
            <div>📧 contact@help-nexus.com</div>
            <div>📞 0000000000</div>
            <button className="cw-contact-cta-btn" onClick={() => { onOpenContact(); setOpen(false); }}>
              ✉ Open Contact Form →
            </button>
          </div>
        )}

        {/* Quick reply chips */}
        {msg.chips?.length > 0 && (
          <div className="cw-chips">
            {msg.chips.map((chip, i) => (
              <button key={i} className="cw-chip" onClick={() => handleUserInput(chip)}>
                {chip}
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="cw-root">
      {open && (
        <div className="cw-window">

          {/* Header */}
          <div className="cw-header">
            <div className="cw-header-top">
              <div>
                <div className="cw-title">{BOT.botName}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div className="cw-status">
                  <div className="cw-status-dot" />
                  Online
                </div>
                <button className="cw-close" onClick={() => setOpen(false)}>
                  <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
                    <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
                  </svg>
                </button>
              </div>
            </div>
            <div className="cw-accent-bar" />
          </div>

          {/* Messages */}
          <div className="cw-messages">
            {msgs.map((m, i) => <Message key={i} msg={m} />)}
            {typing && (
              <div className="cw-msg bot">
                <div className="cw-typing"><span/><span/><span/></div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div className="cw-input-area">
            <textarea className="cw-input" rows={1}
              placeholder={leadMode ? "Type your answer…" : "Ask me anything…"}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKey}
            />
            <button className="cw-send" onClick={() => handleUserInput(input)} disabled={!input.trim()}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="#0a0a0a" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </div>

        </div>
      )}

      {/* FAB */}
      <button className="cw-fab" onClick={() => setOpen(o => !o)}>
        {!open && <div className="cw-dot" />}
        {open ? (
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" color="white">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"/>
          </svg>
        ) : (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" color="white">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ARTICLE SECTIONS RENDERER
══════════════════════════════════════════════════════════════ */
function ArticleSections({ sections }) {
  return (
    <>
      {sections.map((s, i) => {
        switch(s.type) {
          case "heading1":   return <h1 key={i} id={s.id||undefined}>{s.text}</h1>;
          case "heading2":   return <h2 key={i} id={s.id||undefined}>{s.text}</h2>;
          case "paragraph":  return <p  key={i} id={s.id||undefined} dangerouslySetInnerHTML={{__html:s.text}} />;
          case "bulletList": return <ul key={i} className="blist">{s.items.map((it,j)=><li key={j}>{it}</li>)}</ul>;
          default: return null;
        }
      })}
    </>
  );
}

/* ══════════════════════════════════════════════════════════════
   SERVICE BAR
══════════════════════════════════════════════════════════════ */
function ServiceBar() {
  return (
    <nav className="service-bar">
      <div className="service-bar-inner">
        {SERVICES.map(svc => {
          const [l1,l2] = svc.label.split("\n");
          return (
            <div className="svc-item" key={svc.id}>
              <a href="#">{l1}<br/>{l2} ▾</a>
              {svc.subServices?.length > 0 && (
                <div className="svc-dropdown">
                  {svc.subServices.map((s,i)=><a href="#" key={i}>{s}</a>)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </nav>
  );
}

            <ArticleSections sections={aboutPage.sections} />
            <div className="cta-wrap">

            </div>
          </article>

          <aside className="toc-box">
            <h3>Page Content</h3>

/* ══════════════════════════════════════════════════════════════
   CONTACT PAGE
══════════════════════════════════════════════════════════════ */
const BLANK = {fname:"",lname:"",email:"",phone:"",company:"",country:"",service:"",subject:"",message:"",howheard:""};

function ContactPage({ onGoBack }) {
  const { contactPage, aboutPage } = CONTENT;
  const { contactInfo, offices }   = contactPage.sidebar;
  const [form, setForm]     = useState(BLANK);
  const [status, setStatus] = useState("idle");
  const [errMsg, setErrMsg] = useState("");

  const handle = e => setForm({...form,[e.target.name]:e.target.value});
  const reset  = () => { setForm(BLANK); setStatus("idle"); setErrMsg(""); };

  const submit = async e => {
    e.preventDefault(); setStatus("sending"); setErrMsg("");
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        from_name:`${form.fname} ${form.lname}`, from_email:form.email,
        phone:form.phone, company:form.company||"N/A", country:form.country,
        service:form.service||"N/A", subject:form.subject,
        message:form.message, howheard:form.howheard||"N/A"
      }, EMAILJS_PUBLIC_KEY);
      setStatus("success"); setForm(BLANK);
    } catch(err) {
      console.error(err); setErrMsg(contactPage.errorMessage); setStatus("error");
    }
  };

  return (
    <div className="page-enter">
      <nav className="tab-nav">
        <div className="tab-nav-inner">
          {aboutPage.tabNav.map((tab,i)=>(
            <a key={i} href="#" onClick={e=>{e.preventDefault();onGoBack();}}>{tab.label}</a>
          ))}
          <a href="#" className="active">Contact Us</a>
        </div>
      </nav>

      <div className="section-heading-row"><h2>CONTACT US</h2></div>
      <div className="breadcrumb">
        <div className="breadcrumb-inner">
          <a href="#" onClick={e=>{e.preventDefault();onGoBack();}}>Home</a>{" › "}
          <a href="#" className="bc-link">Contact Us</a>
        </div>
      </div>

      <div className="contact-page-wrap">
        <div className="contact-page-inner">
          <section className="contact-form-section">
            <button className="back-btn" onClick={onGoBack}>← Back</button>
            <h1>{contactPage.heading}</h1>
            <p className="intro">{contactPage.intro}</p>

            {status==="success" ? (
              <div>
                <div className="success-msg">{contactPage.successMessage}</div>
                <br/>
                <button className="back-btn" onClick={reset}>✉ Send Another Message</button>
              </div>
            ) : (
              <form className="contact-form" onSubmit={submit} noValidate>
                {status==="error" && <div className="form-error-banner">⚠ {errMsg}</div>}
                <div className="form-row">
                  <div><label>First Name <span className="required">*</span></label>
                    <input type="text" name="fname" value={form.fname} onChange={handle} placeholder="Your first name" required /></div>
                  <div><label>Last Name <span className="required">*</span></label>
                    <input type="text" name="lname" value={form.lname} onChange={handle} placeholder="Your last name" required /></div>
                </div>
                <div className="form-row">
                  <div><label>Business Email <span className="required">*</span></label>
                    <input type="email" name="email" value={form.email} onChange={handle} placeholder="your@company.com" required /></div>
                  <div><label>Phone Number <span className="required">*</span></label>
                    <input type="tel" name="phone" value={form.phone} onChange={handle} placeholder="+91 00000 00000" required /></div>
                </div>
                <div className="form-row">
                  <div><label>Company Name</label>
                    <input type="text" name="company" value={form.company} onChange={handle} placeholder="Your company name" /></div>
                  <div><label>Country <span className="required">*</span></label>
                    <select name="country" value={form.country} onChange={handle} required>
                      <option value="">— Select Country —</option>
                      <option>India</option><option>United States</option>
                      <option>United Kingdom</option><option>Canada</option>
                      <option>Australia</option><option>Germany</option>
                      <option>France</option><option>Other</option>
                    </select></div>
                </div>
                <div className="form-row full"><div>
                  <label>Service You're Interested In</label>
                  <select name="service" value={form.service} onChange={handle}>
                    <option value="">— Select a Service —</option>
                    {SERVICES.map(svc=>(
                      <option key={svc.id} value={svc.label.replace("\n"," ")}>{svc.label.replace("\n"," ")}</option>
                    ))}
                  </select>
                </div></div>
                <div className="form-row full"><div>
                  <label>Subject <span className="required">*</span></label>
                  <input type="text" name="subject" value={form.subject} onChange={handle} placeholder="Brief subject of your inquiry" required />
                </div></div>
                <div className="form-row full"><div>
                  <label>Your Message <span className="required">*</span></label>
                  <textarea name="message" value={form.message} onChange={handle} placeholder="Please describe your requirements in detail..." required rows="6" />
                </div></div>
                <div className="form-row full"><div>
                  <label>How Did You Hear About Us?</label>
                  <select name="howheard" value={form.howheard} onChange={handle}>
                    <option value="">— Select —</option>
                    <option>Google / Search Engine</option><option>LinkedIn</option>
                    <option>Referral from a colleague</option><option>Social Media</option>
                    <option>Advertisement</option><option>Other</option>
                  </select>
                </div></div>
                <div className="submit-row">
                  <button type="submit" className="submit-btn" disabled={status==="sending"}>
                    {status==="sending" ? "⏳ Sending…" : "✉ SEND MESSAGE"}
                  </button>
                  <button type="button" className="reset-btn" onClick={reset}>Clear Form</button>
                </div>
                <p className="form-note-bottom">
                  By submitting this form, you agree to our <a href="#">Privacy Policy</a> and <a href="#">Terms of Use</a>.<br/>
                  We respect your privacy and will never share your information with third parties.
                </p>
              </form>
            )}
          </section>

          <aside className="contact-sidebar">
            <div className="contact-info-box">
              <div className="box-title">{contactInfo.title}</div>
              <div className="box-body">
                {contactInfo.rows.map((row,i)=>(
                  <div className="ci-row" key={i}>
                    <span className="ci-icon">{row.icon}</span>
                    <div>
                      <span className="ci-label">{row.label}</span>
                      {row.href ? <a href={row.href}>{row.text}</a> : <span>{row.text}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="office-box">
              <div className="box-title">{offices.title}</div>
              {offices.cards.map((card,i)=>(
                <div className="office-card" key={i}>
                  <strong>{card.flag} {card.name}</strong>
                  {card.lines.map((line,j)=><span key={j}>{line}<br/></span>)}
                  {card.email && <a href={"mailto:"+card.email}>{card.email}</a>}
                </div>
              ))}
            </div>
          </aside>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROOTS
══════════════════════════════════════════════════════════════ */
function LogoRoot() {
  const { site } = CONTENT;
  return <><span className="logo-name">{site.name}</span><span className="logo-slogan">{site.slogan}</span></>;
}
function HeaderNavRoot() {
  return CONTENT.header.navLinks.map((l,i)=><a key={i} href={l.href}>{l.label}</a>);
}
function ContactBtnRoot() {
  const go = () => { if (_setPageGlobal) { _setPageGlobal("contact"); window.scrollTo({top:0,behavior:"smooth"}); } };
  return <button className="contact-btn-react" onClick={go}>✉ CONTACT US</button>;
}

function AppRoot() {
  const [page, setPage] = useState("about");
  useEffect(() => { _setPageGlobal = setPage; }, []);
  const goContact = () => { setPage("contact"); window.scrollTo({top:0,behavior:"smooth"}); };
  const goBack    = () => { setPage("about");   window.scrollTo({top:0,behavior:"smooth"}); };
  return page === "about"
    ? <AboutPage   onGoContact={goContact} />
    : <ContactPage onGoBack={goBack} />;
}

function ChatRoot() {
  const openContact = () => {
    if (_setPageGlobal) { _setPageGlobal("contact"); window.scrollTo({top:0,behavior:"smooth"}); }
  };
  return <ChatWidget onOpenContact={openContact} />;
}

/* ══════════════════════════════════════════════════════════════
   MOUNT
══════════════════════════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById("logo-root")).render(<LogoRoot />);
ReactDOM.createRoot(document.getElementById("header-nav-root")).render(<HeaderNavRoot />);
ReactDOM.createRoot(document.getElementById("contact-btn-root")).render(<ContactBtnRoot />);
ReactDOM.createRoot(document.getElementById("service-bar-root")).render(<ServiceBar />);
ReactDOM.createRoot(document.getElementById("app-root")).render(<AppRoot />);
ReactDOM.createRoot(document.getElementById("footer-root")).render(<Footer />);
ReactDOM.createRoot(document.getElementById("chat-root")).render(<ChatRoot />);
</script>
</body>
</html>
