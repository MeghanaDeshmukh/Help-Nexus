<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelpNexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
  <script src="https://assets.calendly.com/assets/external/widget.js"></script>
  <style>
    .page-enter { animation: fadeIn 0.22s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .tab-nav-inner a.active { background:var(--color-primary-light); color:#fff; border-color:var(--color-primary-light); }
    .contact-btn-react { background:var(--color-accent); color:#fff !important; font-size:13px; font-weight:700; padding:9px 20px; letter-spacing:.04em; border-radius:2px; white-space:nowrap; cursor:pointer; border:none; font-family:inherit; transition:background .2s ease; }
    .contact-btn-react:hover { background:var(--color-accent-dark); }
    .back-btn { display:inline-flex; align-items:center; gap:6px; background:none; border:1px solid var(--color-primary); color:var(--color-primary); font-size:13px; font-weight:600; padding:7px 16px; border-radius:2px; cursor:pointer; font-family:inherit; margin-bottom:20px; transition:all .15s ease; }
    .back-btn:hover { background:var(--color-primary); color:#fff; }
    .form-error-banner { background:#fff0f0; border:1px solid #fcc; border-left:4px solid #e53935; padding:12px 16px; border-radius:2px; margin-bottom:16px; font-size:13.5px; color:#c62828; }
    .success-msg { display:block !important; }
    /* ── Shared page styles (used across multiple page files) ── */
    .simple-page-wrap { max-width:900px; margin:0 auto; padding:48px 24px 80px; }
    .simple-page-wrap h1 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:700; margin-bottom:12px; color:var(--color-primary,#1a1a2e); display:inline-block; line-height:1.3; letter-spacing:0; }
    .simple-page-wrap h2 { font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; margin:28px 0 10px; color:var(--color-primary,#1a1a2e); display:inline-block; line-height:1.3; letter-spacing:0; }
    .simple-page-wrap p  { line-height:1.75; color:#444; margin-bottom:14px; }
    .simple-page-wrap ul { padding-left:20px; margin-bottom:16px; }
    .simple-page-wrap ul li { line-height:1.75; color:#444; margin-bottom:8px; }
    .placeholder-card { background:#f7f8fc; border:2px dashed #d0d4e8; border-radius:8px; padding:40px 32px; text-align:center; color:#888; margin:32px 0; }
    .placeholder-card .ph-icon { font-size:2.5rem; margin-bottom:12px; }
    .placeholder-card p { color:#999; font-size:14px; margin:0; }
    .testimonial-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; margin-top:28px; }
    .testimonial-card { background:#fff; border:1px solid #e8eaf0; border-radius:10px; padding:24px 20px; box-shadow:0 2px 12px rgba(0,0,0,.05); }
    .testimonial-card .stars { color:#f5a623; font-size:15px; margin-bottom:10px; }
    .testimonial-card .quote { font-size:14px; line-height:1.7; color:#444; margin-bottom:16px; font-style:italic; }
    .testimonial-card .author { font-weight:700; font-size:13px; color:#222; }
    .testimonial-card .role   { font-size:12px; color:#888; }
    .team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:24px; margin-top:28px; }
    .team-card { background:#fff; border:1px solid #e8eaf0; border-radius:10px; padding:28px 20px; text-align:center; box-shadow:0 2px 12px rgba(0,0,0,.05); }
    .team-avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,var(--color-primary-light,#3a5bd9),var(--color-accent,#e8524a)); margin:0 auto 14px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; color:#fff; font-weight:700; }
    .team-card .t-name { font-weight:700; font-size:14px; color:#1a1a2e; margin-bottom:4px; display:inline-block; line-height:1.3; }
    .team-card .t-role { font-size:12px; color:#888; }
    .steps-list { list-style:none; padding:0; margin:28px 0; }
    .steps-list li { display:flex; gap:20px; align-items:flex-start; margin-bottom:28px; }
    .step-num { flex-shrink:0; width:44px; height:44px; border-radius:50%; background:var(--color-primary-light,#3a5bd9); color:#fff; font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; display:flex; align-items:center; justify-content:center; }
    .step-body h3 { font-size:15px; font-weight:700; margin:0 0 6px; color:#1a1a2e; }
    .step-body p  { font-size:14px; color:#555; line-height:1.65; margin:0; }
    .story-card { background:#fff; border:1px solid #e8eaf0; border-left:4px solid var(--color-primary-light,#3a5bd9); border-radius:8px; padding:24px 22px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
    .story-card h3 { font-size:14px; font-weight:700; margin:0 0 8px; color:#1a1a2e; display:inline-block; line-height:1.3; }
    .story-card p  { font-size:13.5px; color:#555; line-height:1.7; margin:0; }
    .story-stat { display:inline-block; background:#f0f3ff; color:var(--color-primary-light,#3a5bd9); font-weight:700; font-size:13px; padding:3px 10px; border-radius:20px; margin-top:10px; }
    .industry-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; margin-top:20px; }
    .industry-card { background:#fff; border:1px solid #e8eaf0; border-radius:10px; padding:22px 20px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    .industry-card .ind-icon { font-size:2rem; margin-bottom:10px; }
    .industry-card .ind-name { font-weight:700; font-size:14px; margin-bottom:6px; color:#1a1a2e; display:inline-block; line-height:1.3; }
    .industry-card .ind-desc { font-size:13.5px; color:#555; line-height:1.65; }
    /* ── Chat widget ── */
    .cw-root * { box-sizing:border-box; margin:0; padding:0; }
    .cw-root { font-family:'DM Sans',sans-serif; position:fixed; bottom:28px; right:28px; z-index:9999; }
    .cw-fab { width:60px; height:60px; border-radius:16px; background:#0a0a0a; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 32px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2); transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s; position:relative; overflow:hidden; }
    .cw-fab::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,#e8ff47 0%,#00e5ff 100%); opacity:0; transition:opacity .2s; }
    .cw-fab:hover { transform:scale(1.08); box-shadow:0 12px 40px rgba(0,0,0,.4); }
    .cw-fab:hover::before { opacity:1; }
    .cw-fab svg { position:relative; z-index:1; transition:color .2s; }
    .cw-fab:hover svg { color:#0a0a0a !important; }
    .cw-dot { position:absolute; top:8px; right:8px; width:10px; height:10px; background:#e8ff47; border-radius:50%; border:2px solid #0a0a0a; animation:cw-pulse 2s infinite; }
    @keyframes cw-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:.7} }
    .cw-window { position:absolute; bottom:72px; right:0; width:370px; max-height:560px; background:#0a0a0a; border-radius:24px; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.07); transform-origin:bottom right; animation:cw-open .3s cubic-bezier(.34,1.56,.64,1); }
    @keyframes cw-open { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
    .cw-header { padding:18px 20px 14px; background:#111; border-bottom:1px solid rgba(255,255,255,.06); flex-shrink:0; }
    .cw-header-top { display:flex; align-items:center; justify-content:space-between; }
    .cw-title { font-family:'Syne',sans-serif; font-weight:800; font-size:15px; color:#fff; letter-spacing:-.3px; }
    .cw-status { display:flex; align-items:center; gap:6px; font-size:11px; color:rgba(255,255,255,.4); }
    .cw-status-dot { width:6px; height:6px; background:#e8ff47; border-radius:50%; }
    .cw-close { background:rgba(255,255,255,.07); border:none; color:rgba(255,255,255,.5); width:28px; height:28px; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,color .15s; margin-left:10px; }
    .cw-close:hover { background:rgba(255,255,255,.12); color:#fff; }
    .cw-accent-bar { height:2px; background:linear-gradient(90deg,#e8ff47,#00e5ff); border-radius:2px; margin-top:10px; width:40px; }
    .cw-messages { flex:1; overflow-y:auto; padding:14px 14px 6px; display:flex; flex-direction:column; gap:10px; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,.1) transparent; min-height:0; }
    .cw-messages::-webkit-scrollbar { width:4px; }
    .cw-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:4px; }
    .cw-msg { display:flex; flex-direction:column; max-width:85%; animation:cw-msg-in .18s ease; }
    @keyframes cw-msg-in { from{transform:translateY(5px);opacity:0} to{transform:translateY(0);opacity:1} }
    .cw-msg.user { align-self:flex-end; align-items:flex-end; }
    .cw-msg.bot  { align-self:flex-start; align-items:flex-start; }
    .cw-bubble { padding:10px 14px; border-radius:16px; font-size:13px; line-height:1.55; }
    .cw-msg.user .cw-bubble { background:linear-gradient(135deg,#e8ff47,#c8e000); color:#0a0a0a; border-bottom-right-radius:4px; font-weight:500; }
    .cw-msg.bot  .cw-bubble { background:#1c1c1c; color:rgba(255,255,255,.88); border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,.06); }
    .cw-typing { display:flex; align-items:center; gap:4px; padding:12px 14px; background:#1c1c1c; border-radius:16px; border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,.06); width:fit-content; }
    .cw-typing span { width:6px; height:6px; background:rgba(255,255,255,.3); border-radius:50%; animation:cw-bounce 1.2s infinite; }
    .cw-typing span:nth-child(2) { animation-delay:.2s; }
    .cw-typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes cw-bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px);background:#e8ff47} }
    .cw-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; max-width:320px; }
    .cw-chip { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.8); font-size:11.5px; padding:5px 11px; border-radius:20px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s,border-color .15s; white-space:nowrap; }
    .cw-chip:hover { background:rgba(232,255,71,.15); border-color:rgba(232,255,71,.4); color:#e8ff47; }
    .cw-inline-btn { background:none; border:1px solid rgba(232,255,71,.5); color:#e8ff47; font-size:12.5px; padding:3px 10px; border-radius:12px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s; }
    .cw-inline-btn:hover { background:rgba(232,255,71,.15); }
    .cw-contact-cta { background:#1a1a1a; border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:12px 14px; margin-top:4px; font-size:12.5px; color:rgba(255,255,255,.7); }
    .cw-contact-cta-btn { display:block; width:100%; margin-top:10px; background:linear-gradient(135deg,#e8ff47,#c8e000); color:#0a0a0a; border:none; border-radius:10px; padding:9px; font-weight:700; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity .15s; }
    .cw-contact-cta-btn:hover { opacity:.88; }
    .cw-input-area { padding:10px 12px 14px; background:#111; border-top:1px solid rgba(255,255,255,.06); display:flex; gap:8px; align-items:flex-end; flex-shrink:0; }
    .cw-input { flex:1; background:#1c1c1c; border:1px solid rgba(255,255,255,.08); border-radius:12px; color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; padding:9px 13px; resize:none; outline:none; transition:border-color .15s; max-height:90px; line-height:1.4; }
    .cw-input::placeholder { color:rgba(255,255,255,.25); }
    .cw-input:focus { border-color:rgba(232,255,71,.4); }
    .cw-send { width:38px; height:38px; border-radius:10px; background:#e8ff47; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform .15s,background .15s; }
    .cw-send:hover { transform:scale(1.06); background:#d4eb2a; }
    .cw-send:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* == Services Page == */
    .svc-page-jumps { display:flex; flex-wrap:wrap; gap:10px; max-width:960px; margin:0 auto; padding:20px 24px 0; }
    .svc-jump-link { background:#f0f3ff; color:var(--color-primary-light,#3a5bd9); border:1px solid #d0d8f8; font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:20px; text-decoration:none; white-space:nowrap; transition:background .15s,color .15s; }
    .svc-jump-link:hover { background:var(--color-primary-light,#3a5bd9); color:#fff; border-color:transparent; }
    .svc-page-wrap { max-width:960px; margin:0 auto; padding:32px 24px 80px; }
    .svc-section { border:1px solid #e8eaf0; border-radius:12px; padding:36px 32px 28px; margin-bottom:36px; background:#fff; box-shadow:0 2px 12px rgba(0,0,0,.04); scroll-margin-top:80px; }
    .svc-section-header { display:flex; align-items:flex-start; gap:20px; margin-bottom:28px; }
    .svc-section-num { flex-shrink:0; font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:var(--color-primary-light,#3a5bd9); opacity:.18; line-height:1; }
    .svc-section-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; color:var(--color-primary,#1a1a2e); margin:0 0 4px; display:inline-block; line-height:1.3; letter-spacing:0; }
    .svc-section-sub { font-size:13.5px; color:#777; margin:0; }
    .svc-cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-bottom:28px; }
    .svc-card { background:#f7f8fc; border:1px solid #e4e8f4; border-radius:8px; padding:16px 14px; transition:box-shadow .15s,border-color .15s; }
    .svc-card:hover { box-shadow:0 4px 16px rgba(58,91,217,.1); border-color:var(--color-primary-light,#3a5bd9); }
    .svc-card-icon { width:28px; height:28px; border-radius:50%; background:var(--color-primary-light,#3a5bd9); color:#fff; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
    .svc-card-name { font-size:13.5px; font-weight:600; color:#1a1a2e; line-height:1.4; }
    .svc-card-desc { font-size:12px; color:#666; line-height:1.55; margin-top:6px; }
    .svc-section-cta { text-align:right; }

    /* ============================================================
       ABOUT PAGE
    ============================================================ */
    .about-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px 80px 32px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .about-layout { grid-template-columns: 1fr; margin: 0 auto; padding: 32px 16px 80px; }
      .about-sidebar { position: static !important; }
    }

    /* 2-per-row card grid */
    .about-cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    @media (max-width: 640px) {
      .about-cards-grid { grid-template-columns: 1fr; }
    }

    /* Individual card — uniform height */
    .about-card {
      background: #fff;
      border: 1px solid #e8eaf0;
      border-radius: 10px;
      padding: 22px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      scroll-margin-top: 80px;
      display: flex;
      flex-direction: column;
    }
    .about-card-heading {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-primary, #1a1a2e);
      margin: 0 0 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--color-primary-light, #3a5bd9);
      display: inline-block;
      line-height: 1.3;
      letter-spacing: 0;
    }
    .about-sections { min-width: 0; padding-right: 20px; }
    .about-section-body { flex: 1; }
    .about-section-body p  { font-size: 13.5px; line-height: 1.75; color: #444; margin-bottom: 9px; }
    .about-section-body p:last-child { margin-bottom: 0; }
    .about-blist { padding-left: 16px; margin: 0 0 9px; }
    .about-blist li { font-size: 13.5px; line-height: 1.7; color: #444; margin-bottom: 6px; }

    /* Sticky sidebar */
    .about-sidebar {
      position: sticky;
      top: 72px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
      width: 100%;
    }
    /* Accordion panels */
    .about-accordion {
      width: 220px;
      margin-left: auto;
      border: 1px solid #d0d8f8;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .about-accordion-toggle {
      width: 100%;
      background: var(--color-primary-light, #3a5bd9);
      color: #fff;
      border: none;
      padding: 13px 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background .2s;
      text-align: left;
    }
    .about-accordion-toggle:hover { background: var(--color-primary, #1a1a2e); }
    .toggle-arrow { font-size: 10px; opacity: .8; flex-shrink: 0; margin-left: 8px; }
    .about-accordion-body {
      padding: 16px 14px;
      animation: fadeIn .18s ease;
    }

    /* Get in Touch rows */
    .about-contact-rows { display: flex; flex-direction: column; gap: 9px; }
    .asi-row { display: flex; align-items: center; gap: 9px; font-size: 13px; }
    .asi-icon { font-size: 15px; }
    .asi-row a { color: var(--color-primary-light, #3a5bd9); text-decoration: none; word-break: break-all; }
    .asi-row a:hover { text-decoration: underline; }
    .asi-row span { color: #555; word-break: break-all; }

    /* Schedule form inside accordion */
    .about-accordion-body .qsub { font-size: 12px; color: #777; margin-bottom: 12px; }
    .about-accordion-body form  { display: flex; flex-direction: column; gap: 9px; }
    .about-accordion-body input,
    .about-accordion-body textarea {
      border: 1px solid #dde0ea; border-radius: 6px;
      padding: 8px 11px; font-size: 13px; font-family: inherit;
      outline: none; transition: border-color .15s; width: 100%;
    }
    .about-accordion-body input:focus,
    .about-accordion-body textarea:focus { border-color: var(--color-primary-light, #3a5bd9); }
    .about-accordion-body button[type="submit"] {
      background: var(--color-accent, #e8524a); color: #fff;
      border: none; border-radius: 6px; padding: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background .2s; width: 100%;
    }
    .about-accordion-body button[type="submit"]:hover { background: var(--color-accent-dark, #c8352d); }
    .about-accordion-body .qnote { font-size: 11px; color: #aaa; margin-top: 8px; }

    /* ============================================================
       LOGO STRIP (Customers page)
    ============================================================ */
    .logo-strip-wrap {
      width: 100%; overflow: hidden;
      background: #f7f8fc; border: 1px solid #e8eaf0;
      border-radius: 10px; padding: 28px 0; margin: 16px 0 8px;
    }
    .logo-strip {
      display: flex; align-items: center; gap: 28px;
      width: max-content;
      animation: logo-scroll 28s linear infinite;
    }
    .logo-strip:hover { animation-play-state: paused; }
    @keyframes logo-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .logo-chip {
      flex-shrink: 0; background: #fff;
      border: 1px solid #e4e8f4; border-radius: 8px;
      padding: 14px 24px; height: 90px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-chip img {
      max-height: 56px; max-width: 140px;
      width: auto; object-fit: contain;
      filter: grayscale(30%); transition: filter .2s;
    }
    .logo-chip:hover img { filter: grayscale(0%); }

    /* ============================================================
       BACK TO TOP BUTTON
    ============================================================ */
    .back-to-top {
      position: fixed; bottom: 100px; left: 28px; z-index: 9998;
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--color-primary, #1a1a2e);
      color: #fff; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
      transform: translateY(8px);
    }
    .back-to-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .back-to-top:hover { background: var(--color-primary-light, #3a5bd9); }

    /* ============================================================
       SERVICES PAGE — sub-item text layout (no bullets/numbers)
    ============================================================ */
    .svc-sub-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
